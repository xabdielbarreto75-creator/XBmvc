<!DOCTYPE html>
<html>
<head>
    <title>XBmvc Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #fff;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #000;
        }

        .nav-center {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            color: #000;
            border: 1px solid #000;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .nav-btn:hover {
            background: #000;
            color: #fff;
        }

        .cart {
            font-size: 22px;
            cursor: pointer;
            color: #000;
        }

        .hidden {
            display: none;
        }

        .landing-space {
            height: 100vh;
        }

        /* SHOP */
        .shop-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 50px;
            margin-top: 120px;
        }

        .shop-container h1 {
            text-align: center;
            width: 100%;
        }

        .product {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product img {
            width: 250px;
            margin: 20px 0;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product img:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.6);
        }

        .arrows {
            display: flex;
            justify-content: space-between;
            width: 100px;
        }

        .arrows span {
            cursor: pointer;
            font-size: 30px;
            user-select: none;
        }

        .detail-container {
            display: flex;
            justify-content: center;
            margin-top: 120px;
        }

        .left-side, .right-side {
            background-color: #fff;
            color: #000;
            padding: 30px;
            border-radius: 10px;
            margin: 20px;
        }

        .left-side img {
            width: 350px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        input, select, .continue-btn {
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .continue-btn {
            background-color: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

    </style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
    <div class="navbar">
        <div class="brand">XBmvc</div>

        <div class="nav-center">
            <button class="nav-btn" onclick="goHome()">Home</button>
            <button class="nav-btn" onclick="goToShop()">Shop</button>
        </div>

        <div class="cart">
            🛒 <span id="cartCount">0</span>
        </div>
    </div>

    <div class="landing-space"></div>
</div>

<!-- SHOP -->
<div id="shop" class="shop-container hidden">
    <h1>Our Products</h1>
    <div class="product">
        <div class="arrows">
            <span onclick="prevImage()">&#8592;</span>
            <span onclick="nextImage()">&#8594;</span>
        </div>
        <img id="productImage" src="WhatsApp Image 2026-01-01 at 15.27.13 (1).jpeg">
    </div>
    <p>Click the image to continue</p>
</div>

<!-- PRODUCT DETAIL -->
<div id="productDetail" class="detail-container hidden">
    <div class="left-side">
        <div class="brand" style="color:#000;">XBmvc</div>
        <img id="detailImage" src="WhatsApp Image 2026-01-01 at 15.27.13 (1).jpeg">
        <div class="arrows">
            <span onclick="prevDetailImage()">&#8592;</span>
            <span onclick="nextDetailImage()">&#8594;</span>
        </div>
    </div>

    <div class="right-side">
        <h2>Please type in your name:</h2>
        <input type="text" id="username">

        <h2>Please type in your phone number:</h2>
        <input type="tel" id="phone">

        <h2>Please pick your size:</h2>
        <select id="size">
            <option>XS</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
        </select>

        <button class="continue-btn">Submit</button>
    </div>
</div>

<script>
const landing=document.getElementById("landing");
const shop=document.getElementById("shop");
const productDetail=document.getElementById("productDetail");
const productImage=document.getElementById("productImage");
const detailImage=document.getElementById("detailImage");

function goToShop(){
    landing.classList.add('hidden');
    shop.classList.remove('hidden');
}

function goHome(){
    shop.classList.add('hidden');
    productDetail.classList.add('hidden');
    landing.classList.remove('hidden');
}

productImage.onclick=()=>{
    shop.classList.add('hidden');
    productDetail.classList.remove('hidden');
}

const images=[
"WhatsApp Image 2026-01-01 at 15.27.13 (1).jpeg",
"WhatsApp Image 2026-01-03 at 22.08.00.jpeg"
];

let i=0;

function nextImage(){i=(i+1)%images.length;productImage.src=images[i];}
function prevImage(){i=(i-1+images.length)%images.length;productImage.src=images[i];}
function nextDetailImage(){nextImage();detailImage.src=images[i];}
function prevDetailImage(){prevImage();detailImage.src=images[i];}
</script>

</body>
</html>
