<!DOCTYPE html>
<html>
<head>
    <title>XBmvc Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #ffffff;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid #ddd;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #000;
        }

        .nav-center {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            color: #000;
            border: 1px solid #000;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:hover {
            background: #000;
            color: #fff;
        }

        .coming-soon-btn {
            background: #ff00ff;
            color: #fff;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 5px;
        }

        .cart {
            font-size: 22px;
            cursor: pointer;
            color: #000;
        }

        .content {
            margin-top: 120px;
            flex: 1;
        }

        /* HOME */
        .hero {
            text-align: center;
            font-size: 60px;
            font-weight: bold;
        }

        .hero-img {
            display: block;
            margin: 30px auto 80px auto;
            max-width: 80%;
            max-height: 70vh;
        }

        /* SHOP */
        .shop-screen {
            display: none;
            padding-top: 140px;
            padding-left: 120px;
            background-color: #000;
            min-height: 100vh;
            color: #fff;
            position: relative;
        }

        .product-card {
            background: #111;
            width: 260px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            position: relative;
            cursor: pointer;
        }

        .product-card img {
            width: 100%;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
        }

        .product-price {
            font-size: 16px;
            margin-top: 5px;
        }

        /* PRODUCT DETAIL */
        .product-detail {
            display: none;
            background: #fff;
            color: #000;
            min-height: 100vh;
            padding-top: 140px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
        }

        .detail-image {
            max-width: 400px;
            border-radius: 8px;
        }

        .detail-section {
            max-width: 400px;
        }

        .detail-section h2 {
            margin-bottom: 10px;
        }

        .detail-section input, .detail-section select, .detail-section button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .detail-section button {
            background-color: #000;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* FOOTER */
        .footer {
            background-color: #ffffff;
            color: #000000;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            padding: 40px 60px;
            box-sizing: border-box;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .footer-left {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .footer-center {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .footer-right {
            font-size: 16px;
            line-height: 1.6;
            text-align: right;
        }

        /* CART */
        .cart-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: #fff;
            color: #000;
            box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            transition: right 0.4s ease;
            z-index: 2000;
            padding: 30px;
        }

        .cart-panel.open {
            right: 0;
        }

        .close-cart {
            cursor: pointer;
            font-weight: bold;
            float: right;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="brand">XBmvc</div>

    <div class="nav-center">
        <button class="nav-btn" onclick="goHome()">Home</button>
        <button class="nav-btn" onclick="goToShop()">Shop</button>
        <button class="coming-soon-btn">Drop 01</button>
    </div>

    <div class="cart" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>
</div>

<div class="content">

    <!-- HOME -->
    <div id="homeContent">
        <div class="hero">Be yourself</div>
        <img src="WhatsApp Image 2026-03-01 at 18.39.12.jpeg" class="hero-img">
    </div>

    <!-- SHOP -->
    <div id="shopScreen" class="shop-screen">
        <div class="product-card" onclick="openProductDetail()">
            <img src="WhatsApp Image 2026-01-01 at 15.27.13.jpeg">
            <div class="product-title">XBMVC Hoodie</div>
            <div class="product-price">$70</div>
        </div>
    </div>

    <!-- PRODUCT DETAIL -->
    <div id="productDetail" class="product-detail">
        <img id="detailImg" src="WhatsApp Image 2026-01-01 at 15.27.13.jpeg" class="detail-image">
        <div class="detail-section">
            <h2>XBMVC Hoodie $70</h2>
            <label>Name:</label>
            <input type="text" id="username" placeholder="Your Name">
            <label>Phone:</label>
            <input type="tel" id="phone" placeholder="Your Phone">
            <label>Email:</label>
            <input type="email" id="email" placeholder="Your Email">
            <label>Size:</label>
            <select id="size">
                <option>XS</option>
                <option>S</option>
                <option>M</option>
                <option>L</option>
                <option>XL</option>
            </select>
            <button onclick="addToCart()">Add to Cart / Buy Now</button>
        </div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-left">XBMVC</div>
    <div class="footer-center">THANK YOU FOR SHOPPING</div>
    <div class="footer-right">
        <div>Please contact us at:</div>
        <div>xbmvcbrand@gmail.com</div>
        <div>860-778-9555</div>
    </div>
</div>

<!-- CART -->
<div id="cartPanel" class="cart-panel">
    <span class="close-cart" onclick="toggleCart()">✕</span>
    <h2>Your Cart</h2>
    <p id="cartItems">No items yet.</p>
</div>

<script>
const homeContent = document.getElementById("homeContent");
const shopScreen = document.getElementById("shopScreen");
const productDetail = document.getElementById("productDetail");
const cartPanel = document.getElementById("cartPanel");

function goToShop(){
    homeContent.style.display = "none";
    shopScreen.style.display = "block";
    productDetail.style.display = "none";
    window.scrollTo(0,0);
}

function goHome(){
    shopScreen.style.display = "none";
    productDetail.style.display = "none";
    homeContent.style.display = "block";
    window.scrollTo(0,0);
}

function toggleCart(){
    cartPanel.classList.toggle("open");
}

function openProductDetail(){
    shopScreen.style.display = "none";
    productDetail.style.display = "flex";
    window.scrollTo(0,0);
}

// Dummy cart function
function addToCart(){
    const name = document.getElementById("username").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const size = document.getElementById("size").value;
    if(!name || !phone || !email){
        alert("Please fill all fields.");
        return;
    }
    document.getElementById("cartItems").innerText = `${name} - ${size} XBMVC Hoodie $70`;
    alert("Added to cart!");
    toggleCart();
}
</script>

</body>
</html>
