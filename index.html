<!DOCTYPE html>
<html>
<head>
    <title>XBmvc Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #ffffff;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid #ddd;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #000;
        }

        .nav-center {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            color: #000;
            border: 1px solid #000;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .nav-btn:hover {
            background: #000;
            color: #fff;
        }

        .cart {
            font-size: 22px;
            cursor: pointer;
            color: #000;
        }

        /* HERO TEXT */
        .hero {
            margin-top: 120px;
            text-align: center;
            font-size: 60px;
            font-weight: bold;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        /* HERO IMAGE */
        .hero-img {
            display: block;
            margin: 30px auto 0 auto;
            max-width: 80%;
            max-height: 70vh;
            height: auto;
            opacity: 0;
            animation: fadeIn 2s 0.5s forwards;
        }

        /* COMING SOON SECTION */
        .coming-soon {
            background-color: #000;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coming-soon button {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: not-allowed;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            opacity: 0.8;
        }

        /* EXPRESS YOURSELF SECTION */
        .express-section {
            background-color: #8000ff; /* purple */
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 50px;
            box-sizing: border-box;
        }

        .express-text {
            font-size: 48px;
            font-weight: bold;
            opacity: 0;
            color: #fff;
            animation: fadeIn 2s 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* SLIDING CART PANEL */
        .cart-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: #fff;
            color: #000;
            box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            transition: right 0.4s ease;
            z-index: 2000;
            padding: 30px;
            box-sizing: border-box;
        }

        .cart-panel.open {
            right: 0;
        }

        .cart-panel h2 {
            margin-top: 0;
        }

        .close-cart {
            cursor: pointer;
            font-weight: bold;
            float: right;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="brand">XBmvc</div>

    <div class="nav-center">
        <button class="nav-btn" onclick="goHome()">Home</button>
        <button class="nav-btn" onclick="goToShop()">Shop</button>
    </div>

    <div class="cart" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>
</div>

<!-- HERO SECTION -->
<div class="hero">
    Be yourself
</div>

<!-- HERO IMAGE -->
<img src="WhatsApp Image 2026-03-01 at 18.39.12.jpeg" alt="Hero Image" class="hero-img">

<!-- COMING SOON BUTTON SECTION -->
<div class="coming-soon">
    <button>Coming Soon!</button>
</div>

<!-- EXPRESS YOURSELF SECTION -->
<div class="express-section">
    <div class="express-text">
        Express yourself the way you want
    </div>
</div>

<!-- CART PANEL -->
<div id="cartPanel" class="cart-panel">
    <span class="close-cart" onclick="toggleCart()">✕</span>
    <h2>Your Cart</h2>
    <p>No items yet.</p>
</div>

<script>
const cartPanel = document.getElementById("cartPanel");

function goToShop(){
    alert("Shop section coming next 🔥");
}

function goHome(){
    window.scrollTo(0,0);
}

function toggleCart(){
    cartPanel.classList.toggle("open");
}
</script>

</body>
</html>
