
<!DOCTYPE html>
<html>
<head>
    <title>XBmvc Shop</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #ffffff;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid #ddd;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #000;
            text-decoration: none;
        }

        .nav-center {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            text-decoration: none;
            background: transparent;
            color: #000;
            border: 1px solid #000;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #000;
            color: #fff;
        }

        /* SHOP HEADER */
        .shop-header {
            margin-top: 150px;
            text-align: center;
            font-size: 50px;
            font-weight: bold;
        }

        /* PRODUCT GRID */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            padding: 80px;
        }

        .product {
            background: #111;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
        }

        .product img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .product h3 {
            margin: 15px 0 5px 0;
        }

        .product p {
            margin: 0 0 15px 0;
        }

        .buy-btn {
            background: #8000ff;
            border: none;
            padding: 10px 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .buy-btn:hover {
            opacity: 0.8;
        }

        /* FOOTER */
        .footer {
            background-color: #ffffff;
            color: #000000;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            padding: 40px 60px;
            box-sizing: border-box;
        }

        .footer-left {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: left;
        }

        .footer-center {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        .footer-right {
            font-size: 16px;
            line-height: 1.6;
            text-align: right;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html" class="brand">XBmvc</a>

    <div class="nav-center">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="shop.html" class="nav-btn">Shop</a>
    </div>
</div>

<!-- SHOP TITLE -->
<div class="shop-header">
    SHOP XBMVC
</div>

<!-- PRODUCTS -->
<div class="product-grid">

    <div class="product">
        <img src="WhatsApp Image 2026-03-01 at 18.39.12.jpeg">
        <h3>XBMVC Hoodie</h3>
        <p>$65.00</p>
        <button class="buy-btn">Add to Cart</button>
    </div>

    <div class="product">
        <img src="WhatsApp Image 2026-03-01 at 18.39.12.jpeg">
        <h3>XBMVC Tee</h3>
        <p>$35.00</p>
        <button class="buy-btn">Add to Cart</button>
    </div>

    <div class="product">
        <img src="WhatsApp Image 2026-03-01 at 18.39.12.jpeg">
        <h3>XBMVC Crewneck</h3>
        <p>$55.00</p>
        <button class="buy-btn">Add to Cart</button>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div class="footer-left">
        XBMVC
    </div>

    <div class="footer-center">
        THANK YOU FOR SHOPPING
    </div>

    <div class="footer-right">
        <div>Please contact us at:</div>
        <div>xbmvcbrand@gmail.com</div>
        <div>860-778-9555</div>
    </div>
</div>

</body>
</html>
